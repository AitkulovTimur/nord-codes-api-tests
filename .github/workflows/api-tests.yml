name: API tests and Allure report

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


permissions:
    contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run API tests
        run: mvn clean test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload tested NordCodes application logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tested-application-logs
          path: target/logs
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Build Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy Allure report to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
#       TODO: заменить на if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
#       чтобы pages обновлялись только после push в main
        if: always()
        with:
          branch: gh-pages
          folder: allure-history
          clean: true
